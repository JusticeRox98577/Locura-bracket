<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Locura Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 16px; }
    button, input { padding: 10px 14px; font-size: 16px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-top: 12px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .muted { opacity: 0.7; }
  </style>
</head>
<body>

<h1>Locura Admin</h1>
<p class="muted">Only admin emails can change settings.</p>

<div class="card">
  <button id="loginBtn">Sign in with Google</button>
  <button id="logoutBtn" style="display:none;">Logout</button>
  <div id="who" class="muted"></div>
</div>

<div class="card">
  <div><b>Settings</b></div>
  <div class="row" style="margin-top:10px;">
    <label>Bracket ID</label>
    <input id="bracketId" type="text" placeholder="locura-2026" />
  </div>

  <div class="row" style="margin-top:10px;">
    <label>Cutoff (local time)</label>
    <input id="cutoff" type="datetime-local" />
    <button id="clearCutoff">Clear cutoff</button>
  </div>

  <div class="row" style="margin-top:10px;">
    <button id="saveBtn">Save Settings</button>
  </div>

  <pre id="status" style="margin-top:10px;"></pre>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    serverTimestamp,
    Timestamp,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDvOZ4HK9jKwWtJb_A-I_XqdVGRjNBqgpg",
    authDomain: "locura-bracket-f9eb5.firebaseapp.com",
    projectId: "locura-bracket-f9eb5",
    storageBucket: "locura-bracket-f9eb5.firebasestorage.app",
    messagingSenderId: "550013357448",
    appId: "1:550013357448:web:943c305507918ed30fbe3d"
  };

  // ✅ PUT YOUR ADMIN EMAIL(S) HERE
  const ADMIN_EMAILS = [
    "YOUR_EMAIL_HERE@gmail.com"
  ];

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const who = document.getElementById("who");
  const status = document.getElementById("status");
  const bracketIdEl = document.getElementById("bracketId");
  const cutoffEl = document.getElementById("cutoff");
  const clearCutoffBtn = document.getElementById("clearCutoff");
  const saveBtn = document.getElementById("saveBtn");

  const configRef = doc(db, "config", "app");

  function isAdmin(user) {
    return user?.email && ADMIN_EMAILS.map(e => e.toLowerCase()).includes(user.email.toLowerCase());
  }

  loginBtn.onclick = async () => signInWithPopup(auth, provider);
  logoutBtn.onclick = async () => signOut(auth);

  clearCutoffBtn.onclick = () => {
    cutoffEl.value = "";
  };

  saveBtn.onclick = async () => {
    const user = auth.currentUser;
    if (!isAdmin(user)) {
      alert("Not an admin.");
      return;
    }

    const newBracketId = (bracketIdEl.value || "").trim() || "locura-2026";
    const cutoffVal = cutoffEl.value; // "YYYY-MM-DDTHH:mm"
    const data = {
      bracketId: newBracketId,
      updatedAt: serverTimestamp(),
      updatedBy: user.email
    };

    if (cutoffVal) {
      // datetime-local is local time; convert to Date then to Firestore Timestamp
      const dt = new Date(cutoffVal);
      if (Number.isNaN(dt.getTime())) {
        alert("Invalid cutoff time.");
        return;
      }
      data.cutoff = Timestamp.fromDate(dt);
    } else {
      data.cutoff = null;
    }

    // Merge so you can add more settings later
    await setDoc(configRef, data, { merge: true });
    alert("Saved.");
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      loginBtn.style.display = "inline";
      logoutBtn.style.display = "none";
      who.textContent = "";
      status.textContent = "Sign in to edit settings.";
      return;
    }

    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";
    who.textContent = `Signed in: ${user.email}`;

    if (!isAdmin(user)) {
      status.textContent = "You are signed in, but you are not an admin for this panel.";
      bracketIdEl.disabled = true;
      cutoffEl.disabled = true;
      clearCutoffBtn.disabled = true;
      saveBtn.disabled = true;
      return;
    }

    bracketIdEl.disabled = false;
    cutoffEl.disabled = false;
    clearCutoffBtn.disabled = false;
    saveBtn.disabled = false;

    // Load and live-update config
    onSnapshot(configRef, (snap) => {
      if (!snap.exists()) {
        status.textContent = "No config doc yet. Set values and press Save.";
        return;
      }
      const cfg = snap.data();
      bracketIdEl.value = cfg.bracketId || "locura-2026";
      if (cfg.cutoff) {
        const d = cfg.cutoff.toDate();
        // Convert to datetime-local string (rough, but works fine)
        const pad = (n) => String(n).padStart(2, "0");
        const s = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        cutoffEl.value = s;
      } else {
        cutoffEl.value = "";
      }

      status.textContent =
        `Current config:\n` +
        `bracketId: ${cfg.bracketId || "locura-2026"}\n` +
        `cutoff: ${cfg.cutoff ? cfg.cutoff.toDate().toString() : "Not set (open)"}\n`;
    });
  });
</script>

</body>
</html>
