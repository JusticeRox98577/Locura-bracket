<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Locura de Marzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>

<h1>Locura de Marzo</h1>

<button id="loginBtn">Sign in with Google</button>
<button id="logoutBtn" style="display:none;">Logout</button>
<button id="submitBtn" style="display:none;">Submit Bracket</button>

<pre id="status"></pre>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDvOZ4HK9jKwWtJb_A-I_XqdVGRjNBqgpg",
    authDomain: "locura-bracket-f9eb5.firebaseapp.com",
    projectId: "locura-bracket-f9eb5",
    storageBucket: "locura-bracket-f9eb5.firebasestorage.app",
    messagingSenderId: "550013357448",
    appId: "1:550013357448:web:943c305507918ed30fbe3d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const submitBtn = document.getElementById("submitBtn");
  const status = document.getElementById("status");

  const BRACKET_ID = "locura-2026";

  // 🔒 CHANGE THIS TO YOUR REAL DEADLINE
  const CUTOFF = new Date("2026-03-10T23:59:00-08:00");

  loginBtn.onclick = async () => {
    await signInWithPopup(auth, provider);
  };

  logoutBtn.onclick = async () => {
    await signOut(auth);
  };

  submitBtn.onclick = async () => {
    const user = auth.currentUser;
    if (!user) return;

    const now = new Date();
    if (now > CUTOFF) {
      alert("Submission deadline has passed.");
      return;
    }

    const ref = doc(db, "submissions", BRACKET_ID, "users", user.uid);

    await updateDoc(ref, {
      submittedAt: serverTimestamp(),
      locked: true
    });

    alert("Bracket submitted and locked.");
    submitBtn.style.display = "none";
    status.textContent = "Bracket locked.";
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      loginBtn.style.display = "inline";
      logoutBtn.style.display = "none";
      submitBtn.style.display = "none";
      status.textContent = "Not signed in.";
      return;
    }

    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";

    const ref = doc(db, "submissions", BRACKET_ID, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      await setDoc(ref, {
        picks: {},
        locked: false,
        createdAt: serverTimestamp()
      });
      submitBtn.style.display = "inline";
      status.textContent = "Bracket editable.";
      return;
    }

    const data = snap.data();

    if (data.locked) {
      submitBtn.style.display = "none";
      status.textContent = "Bracket locked.";
    } else {
      submitBtn.style.display = "inline";
      status.textContent = "Bracket editable.";
    }
  });
</script>

</body>
</html>
