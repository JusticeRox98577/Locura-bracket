<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Locura de Marzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 16px; }
    button { padding: 10px 14px; font-size: 16px; margin-right: 8px; }
    .muted { opacity: 0.7; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-top: 12px; }
  </style>
</head>
<body>

<h1>Locura de Marzo</h1>

<div class="card">
  <button id="loginBtn">Sign in with Google</button>
  <button id="logoutBtn" style="display:none;">Logout</button>
  <button id="submitBtn" style="display:none;">Submit Bracket</button>
  <div id="userLine" class="muted"></div>
</div>

<div class="card">
  <div><b>Status</b></div>
  <pre id="status">Loading...</pre>
</div>

<!-- Later, when you give me the real bracket, we’ll render it here -->
<div class="card">
  <div><b>Bracket</b> <span class="muted">(placeholder)</span></div>
  <p class="muted">Bracket UI will go here once you provide the matchups.</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc,
    serverTimestamp,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  // Your Firebase config (from your screenshot)
  const firebaseConfig = {
    apiKey: "AIzaSyDvOZ4HK9jKwWtJb_A-I_XqdVGRjNBqgpg",
    authDomain: "locura-bracket-f9eb5.firebaseapp.com",
    projectId: "locura-bracket-f9eb5",
    storageBucket: "locura-bracket-f9eb5.firebasestorage.app",
    messagingSenderId: "550013357448",
    appId: "1:550013357448:web:943c305507918ed30fbe3d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const submitBtn = document.getElementById("submitBtn");
  const statusEl = document.getElementById("status");
  const userLine = document.getElementById("userLine");

  // Live config from Firestore: config/app
  const configRef = doc(db, "config", "app");

  let currentBracketId = "locura-2026";
  let currentCutoff = null; // Firestore Timestamp or null

  // Listen to config changes in real-time
  onSnapshot(configRef, (snap) => {
    if (!snap.exists()) return;
    const cfg = snap.data();
    if (typeof cfg.bracketId === "string") currentBracketId = cfg.bracketId;
    currentCutoff = cfg.cutoff ?? null;
    renderStatus();
  });

  function cutoffPassed() {
    if (!currentCutoff) return false;
    const cutoffDate = currentCutoff.toDate();
    return new Date() > cutoffDate;
  }

  function renderStatus(extra = "") {
    const parts = [];
    parts.push(`Bracket: ${currentBracketId}`);
    parts.push(`Cutoff: ${currentCutoff ? currentCutoff.toDate().toString() : "Not set (open)"}`);
    if (cutoffPassed()) parts.push("Cutoff has passed: submissions are closed.");
    if (extra) parts.push(extra);
    statusEl.textContent = parts.join("\n");
  }

  loginBtn.onclick = async () => {
    await signInWithPopup(auth, provider);
  };

  logoutBtn.onclick = async () => {
    await signOut(auth);
  };

  submitBtn.onclick = async () => {
    const user = auth.currentUser;
    if (!user) return;

    if (cutoffPassed()) {
      alert("Submission deadline has passed.");
      return;
    }

    const subRef = doc(db, "submissions", currentBracketId, "users", user.uid);

    // submit == lock forever (rules will enforce too)
    await updateDoc(subRef, {
      submittedAt: serverTimestamp(),
      locked: true,
      updatedAt: serverTimestamp()
    });

    alert("Submitted! Your bracket is now locked.");
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      loginBtn.style.display = "inline";
      logoutBtn.style.display = "none";
      submitBtn.style.display = "none";
      userLine.textContent = "";
      renderStatus("Not signed in.");
      return;
    }

    userLine.textContent = `Signed in: ${user.email}`;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";

    const subRef = doc(db, "submissions", currentBracketId, "users", user.uid);
    const snap = await getDoc(subRef);

    if (!snap.exists()) {
      await setDoc(subRef, {
        picks: {},
        locked: false,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    }

    // Watch their submission to update UI if it becomes locked
    onSnapshot(subRef, (s) => {
      const d = s.data();
      const locked = !!d?.locked;
      const canSubmit = !locked && !cutoffPassed();
      submitBtn.style.display = canSubmit ? "inline" : "none";
      renderStatus(locked ? "Your bracket is locked." : "Your bracket is editable (until you submit).");
    });
  });
</script>

</body>
</html>
